name: Tests

on:
  push:
  pull_request:

jobs:
  busted:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua and Luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 liblua5.4-dev luarocks libncurses-dev
          if update-alternatives --query lua-interpreter > /dev/null 2>&1; then
            sudo update-alternatives --set lua-interpreter /usr/bin/lua5.4
          elif update-alternatives --query lua > /dev/null 2>&1; then
            sudo update-alternatives --set lua /usr/bin/lua5.4
          fi
          if update-alternatives --query luac-compiler > /dev/null 2>&1; then
            sudo update-alternatives --set luac-compiler /usr/bin/luac5.4
          fi
          lua -v
          luarocks --version

      - name: Install test dependencies
        run: |
          sudo luarocks --lua-version=5.4 install busted

      - name: Run tests
        run: |
          busted --verbose
